apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: harbor.altair-lab.com/chloe-ocp/argocd:latest
        ports:
        - containerPort: 80
